<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf7f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vakantie">
<title>Familievakantie Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf7f2;--surface:#fff;--border:#e8e0d5;
    --text:#2a2118;--text-muted:#8a7968;--accent:#c17f3e;--accent-light:#f5e9d8;
    --pa-ma:#4a7c59;--pa-ma-light:#d4e8da;
    --gerben:#3a6fa8;--gerben-light:#d0e3f5;
    --robert:#8b3a8b;--robert-light:#ead0ea;
    --marielle:#c17f3e;--marielle-light:#f5e9d8;
    --jaco:#b84040;--jaco-light:#f5d0d0;
    --beheerder:#2a2118;--beheerder-light:#e8e0d5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
  .hidden{display:none!important;}

  /* LOADING */
  #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:1rem;}
  .loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:var(--text-muted);font-size:.9rem;}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;width:min(420px,92vw);box-shadow:0 8px 40px rgba(42,33,24,.08);}
  .login-title{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:.3rem;}
  .login-subtitle{color:var(--text-muted);font-size:.88rem;margin-bottom:1.5rem;}
  .family-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.25rem;}
  .family-btn{padding:.75rem .9rem;border-radius:12px;border:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;transition:all .2s;text-align:left;}
  .family-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
  .family-btn.selected{border-color:currentColor;font-weight:600;}
  .family-btn[data-family="pa-ma"]{background:var(--pa-ma-light);color:var(--pa-ma);}
  .family-btn[data-family="gerben"]{background:var(--gerben-light);color:var(--gerben);}
  .family-btn[data-family="robert"]{background:var(--robert-light);color:var(--robert);}
  .family-btn[data-family="marielle"]{background:var(--marielle-light);color:var(--marielle);}
  .family-btn[data-family="jaco"]{background:var(--jaco-light);color:var(--jaco);}
  .family-btn[data-family="beheerder"]{background:var(--beheerder-light);color:var(--beheerder);grid-column:1/-1;}
  .pin-row{display:flex;gap:.6rem;align-items:center;}
  .pin-input{flex:1;padding:.7rem 1rem;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;letter-spacing:.2em;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;}
  .pin-input:focus{border-color:var(--accent);}
  .login-btn{padding:.7rem 1.25rem;background:var(--text);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
  .login-btn:hover{background:var(--accent);}
  .login-error{color:#b84040;font-size:.83rem;margin-top:.5rem;min-height:1.2em;}

  /* HEADER */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-title{font-family:'Playfair Display',serif;font-size:1.2rem;}
  .header-title span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:.5rem;}
  .sync-indicator{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:.3rem;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;transition:background .3s;}
  .sync-dot.live{background:#4a7c59;}
  .user-badge{display:flex;align-items:center;gap:.5rem;padding:.35rem .8rem;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:opacity .2s;}
  .user-badge:hover{opacity:.7;}
  .user-dot{width:9px;height:9px;border-radius:50%;}

  /* READONLY BADGE */
  .readonly-badge{display:inline-flex;align-items:center;gap:.3rem;background:#d4e8da;color:#4a7c59;font-size:.72rem;font-weight:600;padding:.25rem .65rem;border-radius:20px;border:1px solid #b8d8c4;}

  /* TABS */
  .day-tabs{display:flex;padding:.75rem 1rem 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{padding:.5rem 1rem;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
  .day-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600;}

  /* LEGEND */
  .legend{background:var(--surface);border-bottom:1px solid var(--border);}
  .legend-families{display:flex;flex-wrap:wrap;gap:.4rem;padding:.6rem 1.25rem .75rem;}
  .legend-item{display:flex;align-items:center;gap:.35rem;font-size:.74rem;color:var(--text-muted);}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  /* MY TASKS BANNER */
  .mtb-wrap{background:#fdf9f4;border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden;}
  .mtb-head{padding:.75rem 1rem .5rem;}
  .mtb-title{font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:.25rem;}
  .mtb-intro{font-size:.78rem;color:var(--text-muted);line-height:1.45;}
  .mtb-progress{font-size:.72rem;font-weight:600;margin-top:.35rem;}
  .mtb-progress.all-done{color:#4a7c59;}
  .mtb-progress.pending{color:var(--accent);}
  .mytask-row{display:flex;align-items:center;gap:.75rem;padding:.55rem 1rem;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
  .mytask-row:hover{background:var(--accent-light);}
  .mytask-row.done{background:#f2faf5;}
  .mytask-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .mytask-check.checked{background:#4a7c59;border-color:#4a7c59;}
  .mytask-info{flex:1;}
  .mytask-name{font-size:.83rem;font-weight:600;color:var(--text);}
  .mytask-row.done .mytask-name{color:#4a7c59;}
  .mytask-meta{font-size:.7rem;color:var(--text-muted);margin-top:.1rem;}
  .mytask-why{font-size:.7rem;color:var(--accent);margin-top:.1rem;font-style:italic;}
  .readonly-info{background:#d4e8da;border:1px solid #b8d8c4;border-radius:10px;padding:.75rem 1rem;font-size:.83rem;color:#2d5c3a;}

  /* MAIN */
  .main{padding:1rem;max-width:900px;margin:0 auto;}

  /* TIMESLOT */
  .timeslot{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden;}
  .timeslot-header{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);}
  .timeslot-time{font-weight:700;font-size:.78rem;color:var(--text-muted);min-width:80px;padding-top:3px;}
  .timeslot-title-wrap{flex:1;}
  .timeslot-name{font-family:'Playfair Display',serif;font-size:.98rem;}
  .timeslot-subtitle{font-size:.75rem;color:var(--text-muted);margin-top:.15rem;}
  .entries{padding:.75rem 1rem .4rem;display:flex;flex-wrap:wrap;gap:.2rem;}
  .claim-tag{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .7rem;border-radius:20px;font-size:.78rem;font-weight:600;margin:.15rem;}
  .claim-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .unclaim-btn{background:none;border:none;cursor:pointer;font-size:.78rem;line-height:1;padding:0 0 0 .3rem;opacity:.5;transition:opacity .2s;}
  .unclaim-btn:hover{opacity:1;}
  .empty-msg{color:var(--text-muted);font-size:.82rem;font-style:italic;padding:.2rem;}
  .slot-note{font-size:.78rem;color:var(--text-muted);margin-top:.3rem;padding:.2rem;width:100%;background:#fffbf5;border-radius:6px;border-left:3px solid var(--accent);padding:.4rem .6rem;}
  .slot-actions{display:flex;gap:.4rem;flex-wrap:wrap;padding:.6rem 1rem .85rem;}
  .claim-btn{padding:.45rem .9rem;background:none;border:2px dashed var(--border);border-radius:9px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
  .claim-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .edit-note-btn{padding:.45rem .8rem;background:none;border:1px solid var(--border);border-radius:9px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
  .edit-note-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* OVERVIEW ── mobile */
  .ov-intro{font-size:.82rem;color:var(--text-muted);margin-bottom:1rem;line-height:1.5;}
  .ov-day-section{margin-bottom:1rem;}
  .ov-day-heading{font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:.4rem;padding-bottom:.3rem;border-bottom:2px solid var(--border);}
  .ov-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.3rem;cursor:pointer;}
  .ov-card-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .75rem;}
  .ov-card-time{font-size:.66rem;font-weight:700;color:var(--text-muted);min-width:62px;flex-shrink:0;}
  .ov-card-name{font-size:.8rem;font-weight:600;color:var(--text);flex:1;}
  .ov-tags-inline{display:flex;flex-wrap:wrap;gap:.2rem;flex-shrink:0;}
  .ov-tag{display:inline-flex;align-items:center;gap:.2rem;font-size:.66rem;font-weight:600;padding:.15rem .4rem;border-radius:20px;}
  .ov-tag-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .ov-note-preview{font-size:.68rem;color:var(--text-muted);font-style:italic;padding:0 .75rem .35rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ov-cta{font-size:.68rem;color:var(--accent);font-weight:600;}
  .ov-empty-slot{background:#fffbf5;}
  .ov-mine{background:#f2faf5;}

  /* OVERVIEW desktop grid */
  @media(min-width:700px){
    .ov-day-section{display:none;}
    .overview-grid{display:grid;grid-template-columns:minmax(150px,1.4fr) repeat(3,1fr);border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface);}
    .ov-gh{padding:.6rem .9rem;font-weight:700;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);background:var(--bg);border-bottom:2px solid var(--border);}
    .ov-gh.day-col{text-align:center;border-left:1px solid var(--border);color:var(--text);font-family:'Playfair Display',serif;font-size:.85rem;text-transform:none;letter-spacing:0;}
    .ov-slot-label{padding:.6rem .9rem;border-bottom:1px solid var(--border);background:var(--bg);}
    .ov-slot-sname{font-weight:600;font-size:.77rem;color:var(--text);}
    .ov-slot-ssub{font-size:.67rem;color:var(--text-muted);margin-top:1px;}
    .ov-slot-time{font-size:.67rem;color:var(--text-muted);margin-top:2px;}
    .ov-cell{padding:.5rem .65rem;border-left:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.18rem;min-height:52px;cursor:pointer;transition:background .15s;}
    .ov-cell.empty{background:#fffbf5;}
    .ov-cell.empty:hover{background:var(--accent-light);}
    .ov-cell.has-me{background:#f2faf5;}
    .ov-cell-tag{display:inline-flex;align-items:center;gap:.25rem;font-size:.67rem;font-weight:600;padding:.15rem .4rem;border-radius:20px;white-space:nowrap;}
    .ov-cell-dot{width:5px;height:5px;border-radius:50%;}
    .ov-cell-cta{font-size:.67rem;color:var(--accent);font-style:italic;}
    .ov-cell-note{font-size:.65rem;color:var(--text-muted);font-style:italic;margin-top:2px;}
    .ov-na{background:#f5f5f5;cursor:default;}
  }
  @media(max-width:699px){
    .overview-grid{display:none;}
  }

  /* TOOLBAR */
  .day-toolbar{display:flex;justify-content:flex-end;gap:.5rem;padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);}
  .toolbar-btn{display:flex;align-items:center;gap:.35rem;padding:.4rem .85rem;background:none;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text-muted);cursor:pointer;transition:all .2s;}
  .toolbar-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(42,33,24,.4);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--surface);border-radius:18px;padding:1.75rem;width:min(460px,94vw);box-shadow:0 20px 60px rgba(42,33,24,.2);}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1.25rem;}
  .modal-title-span{color:var(--accent);font-size:.9rem;font-family:'DM Sans',sans-serif;font-weight:400;margin-left:.4rem;}
  .form-group{margin-bottom:.9rem;}
  .form-label{font-size:.78rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:.35rem;letter-spacing:.05em;text-transform:uppercase;}
  .note-input{width:100%;padding:.65rem .85rem;border:2px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--bg);color:var(--text);resize:none;outline:none;transition:border-color .2s;}
  .note-input:focus{border-color:var(--accent);}
  .modal-actions{display:flex;gap:.6rem;margin-top:1.25rem;}
  .btn-primary{flex:1;padding:.7rem;background:var(--text);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s;}
  .btn-primary:hover{background:var(--accent);}
  .btn-cancel{padding:.7rem 1.1rem;background:none;color:var(--text-muted);border:2px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;}
  .btn-cancel:hover{border-color:var(--text-muted);color:var(--text);}
  .modal-claim-info{background:var(--accent-light);border:1px solid #e8d0ae;border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:var(--text);line-height:1.5;margin-bottom:.5rem;}
  .modal-claim-info strong{color:var(--accent);}

  /* PRINT */
  @media print{
    #loading-screen,#login-screen,.day-tabs,.legend,.day-toolbar,header{display:none!important;}
    .slot-actions{display:none!important;}
    body{background:#fff;}
    .timeslot{break-inside:avoid;border:1px solid #ddd;margin-bottom:.5rem;}
    .print-header{display:block!important;}
  }
  .print-header{display:none;font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #2a2118;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Verbinden met database...</div>
</div>

<div id="login-screen" class="hidden">
  <div class="login-card">
    <h1 class="login-title">🌿 Familievakantie</h1>
    <p class="login-subtitle">29 april – 1 mei &middot; Kies jouw familie en pincode</p>
    <div class="family-grid">
      <button class="family-btn" data-family="pa-ma">👴👵 Pa &amp; Ma</button>
      <button class="family-btn" data-family="gerben">👨‍👩‍👧‍👦 Gerben &amp; Bertine</button>
      <button class="family-btn" data-family="robert">👨‍👩‍👧 Robert &amp; Renate</button>
      <button class="family-btn" data-family="marielle">👩 Mariëlle</button>
      <button class="family-btn" data-family="jaco">👨‍👩‍👦 Jaco &amp; Berdieke</button>
      <button class="family-btn" data-family="beheerder">🔑 Beheerder</button>
    </div>
    <div class="pin-row">
      <input type="password" class="pin-input" id="pin-input" placeholder="Pincode" maxlength="6" inputmode="numeric">
      <button class="login-btn" onclick="doLogin()">Inloggen →</button>
    </div>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-title">🌿 Vakantie <span>Planning</span></div>
    <div class="header-right">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">verbinden...</span></div>
      <div class="user-badge" onclick="logout()">
        <div class="user-dot" id="user-dot"></div>
        <span id="user-name">...</span>
        <span style="color:var(--text-muted)">· Uit</span>
      </div>
    </div>
  </header>
  <div class="legend" id="legend">
    <div class="legend-families" id="legend-families"></div>
  </div>
  <div class="day-tabs">
    <button class="day-tab" onclick="selectOverview(this)">📋 Overzicht</button>
    <button class="day-tab active" onclick="selectDay(0,this)">Wo 29/4</button>
    <button class="day-tab" onclick="selectDay(1,this)">Do 30/4</button>
    <button class="day-tab" onclick="selectDay(2,this)">Vr 1/5</button>
  </div>
  <div class="day-toolbar" id="day-toolbar">
    <button class="toolbar-btn" onclick="printDay()">🖨️ PDF dag</button>
  </div>
  <div class="main" id="day-view"></div>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 class="modal-title">Activiteit <span id="modal-subtitle" class="modal-title-span"></span></h2>
    <div id="modal-claim-block"></div>
    <div class="form-group hidden" id="note-group">
      <label class="form-label" id="note-label">Omschrijving</label>
      <textarea class="note-input" id="note-input" rows="2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveEntry()">Ik doe dit!</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGI2y3JXM67l90A8WnGYxEfTiHmKPeOWk",
  authDomain: "vakantieproject-d56da.firebaseapp.com",
  databaseURL: "https://vakantieproject-d56da-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "vakantieproject-d56da",
  storageBucket: "vakantieproject-d56da.firebasestorage.app",
  messagingSenderId: "381790299584",
  appId: "1:381790299584:web:b59762dd2ec346dd981425"

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Static data ─────────────────────────────
const FAMILIES = {
  'pa-ma':    {label:'Pa & Ma',          color:'#4a7c59',light:'#d4e8da',pin:'1234',readonly:true},
  'gerben':   {label:'Gerben & Bertine', color:'#3a6fa8',light:'#d0e3f5',pin:'2580'},
  'robert':   {label:'Robert & Renate',  color:'#8b3a8b',light:'#ead0ea',pin:'1357'},
  'marielle': {label:'Mariëlle',         color:'#c17f3e',light:'#f5e9d8',pin:'9630'},
  'jaco':     {label:'Jaco & Berdieke',  color:'#b84040',light:'#f5d0d0',pin:'7410'},
  'beheerder':{label:'Beheerder',        color:'#2a2118',light:'#e8e0d5',pin:'Jaco'},
};

const DAYS = ['Wo 29 april','Do 30 april','Vr 1 mei'];
const SHORT_DAYS = ['Wo 29/4','Do 30/4','Vr 1/5'];

const TIMESLOTS = [
  {id:'ontbijt_klaar',  label:'Ontbijt klaarmaken',  subtitle:'Tafel dekken voor het ontbijt', time:'08:00–08:45',days:[1,2],pts:2},
  {id:'tafel_opruimen1',label:'Tafel opruimen',       subtitle:'Na het ontbijt',                time:'08:45–09:00',days:[1,2],pts:1},
  {id:'ochtend',        label:'Activiteit ochtend',   subtitle:'Wat gaan we doen?',             time:'09:00–12:00',days:[0,1,2],hasNote:true,noteLabel:'Activiteit',notePlaceholder:'Bijv. wandelen, fietsen, spelletjes...',pts:3},
  {id:'middageten',     label:'Middageten',           subtitle:'Samen lunchen',                 time:'12:00–13:00',days:[0,1,2],pts:2},
  {id:'middag',         label:'Activiteit middag',    subtitle:'Wat gaan we doen?',             time:'14:00–17:00',days:[0,1,2],hasNote:true,noteLabel:'Activiteit',notePlaceholder:'Bijv. zwemmen, museum, vrij programma...',pts:3},
  {id:'avondeten_klaar',label:'Avondeten klaarmaken', subtitle:'Tafel dekken en koken',         time:'17:00–18:30',days:[0,1,2],hasNote:true,noteLabel:'Wat eten we?',notePlaceholder:'Bijv. pasta, BBQ, soep...',pts:3},
  {id:'tafel_afruimen', label:'Tafel afruimen',       subtitle:'Na het avondeten',              time:'18:30–18:45',days:[0,1],pts:1},
  {id:'koffie',         label:'Koffie klaarzetten',   subtitle:'En samen drinken',              time:'19:30–19:45',days:[0,1],pts:1},
  {id:'avond',          label:'Avondactiviteit',      subtitle:'Wat gaan we doen?',             time:'19:45–22:00',days:[0,1],hasNote:true,noteLabel:'Activiteit',notePlaceholder:'Bijv. spelletjes, film, wandeling...',pts:3},
];

function slotsForDay(day){ return TIMESLOTS.filter(s=>s.days.includes(day)); }

// ── Task requirements ──────────────────────────
// How many tasks each family must claim & complete
const REQUIRED = {
  'gerben':5, 'robert':6, 'marielle':5, 'jaco':6,
};

function requiredCount(){
  return REQUIRED[currentUser]||0;
}
// Count tasks claimed by this family across all days
function completedCount(familyKey){
  let count=0;
  for(let d=0;d<3;d++) TIMESLOTS.forEach(s=>{
    if(s.days.includes(d)&&planning[d]&&planning[d][s.id]&&planning[d][s.id].claimedBy.includes(familyKey)) count++;
  });
  return count;
}

// ── State ────────────────────────────────────
let planning={};
let currentUser=null, currentDay=0, currentView='day', modalContext=null;

function isReadOnly(){ return currentUser && FAMILIES[currentUser] && FAMILIES[currentUser].readonly; }

function initPlanning(){
  for(let d=0;d<3;d++){
    planning[d]={};
    TIMESLOTS.forEach(s=>planning[d][s.id]={claimedBy:[],note:''});
  }
}
initPlanning();

// ── Firebase ─────────────────────────────────
onValue(ref(db,'planning'),async(snapshot)=>{
  const data=snapshot.val();
  if(data){
    for(let d=0;d<3;d++){
      if(data[d]) TIMESLOTS.forEach(s=>{
        if(data[d][s.id]){
          const fb=data[d][s.id];
          planning[d][s.id]={
            claimedBy: fb.claimedBy ? Object.values(fb.claimedBy) : [],
            note: fb.note||''
          };
        }
      });
    }
  }
  document.getElementById('sync-dot').classList.add('live');
  document.getElementById('sync-text').textContent='live';
  await seedGerbenWednesday();
  document.getElementById('loading-screen').classList.add('hidden');
  if(!currentUser){
    document.getElementById('login-screen').classList.remove('hidden');
  } else {
    if(currentView==='overview') renderOverview();
    else renderDay(currentDay);
  }
},(err)=>{
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
});

async function seedGerbenWednesday(){
  // Pre-seed koffie (wo=day0) and avond (wo=day0) with gerben if not yet claimed
  const koffie=planning[0]['koffie'];
  const avond=planning[0]['avond'];
  let changed=false;
  if(!koffie.claimedBy.includes('gerben')){
    koffie.claimedBy.push('gerben'); changed=true;
    await saveSlot(0,'koffie');
  }
  if(!avond.claimedBy.includes('gerben')){
    avond.claimedBy.push('gerben'); changed=true;
    await saveSlot(0,'avond');
  }
}

async function saveSlot(day,slotId){
  const slot=planning[day][slotId];
  const updates={};
  updates[`planning/${day}/${slotId}/note`]=slot.note||'';
  updates[`planning/${day}/${slotId}/claimedBy`]=slot.claimedBy.length>0
    ? Object.fromEntries(slot.claimedBy.map((f,i)=>[i,f])) : null;
  await update(ref(db),updates);
}

// ── Login ─────────────────────────────────────
const SEL={key:null};
document.querySelectorAll('.family-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.family-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    SEL.key=btn.dataset.family;
    document.getElementById('pin-input').focus();
  });
});
document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

window.doLogin=function(){
  const key=SEL.key, pin=document.getElementById('pin-input').value;
  const err=document.getElementById('login-error');
  if(!key){err.textContent='Kies eerst een familie.';return;}
  if(pin!==FAMILIES[key].pin){err.textContent='Pincode klopt niet.';return;}
  currentUser=key;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
};

window.logout=function(){
  currentUser=null; SEL.key=null;
  document.querySelectorAll('.family-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pin-input').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
};

// ── App init ──────────────────────────────────
function renderMyTasksBanner(){
  if(isReadOnly()||!currentUser||currentUser==='beheerder') return '';
  const req=requiredCount();
  if(!req) return '';
  const done=completedCount(currentUser);
  const allDone=done>=req;
  const checkSVG='<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  // Collect all claimed tasks for this user
  let claimedRows='';
  for(let d=0;d<3;d++){
    TIMESLOTS.forEach(s=>{
      if(!s.days.includes(d)) return;
      if(!planning[d]||!planning[d][s.id]) return;
      if(!planning[d][s.id].claimedBy.includes(currentUser)) return;
      claimedRows+=`<div class="mytask-row done">
        <div class="mytask-check checked">${checkSVG}</div>
        <div class="mytask-info">
          <div class="mytask-name">${s.label}</div>
          <div class="mytask-meta">${DAYS[d]} · ${s.time}</div>
        </div>
      </div>`;
    });
  }
  // Empty placeholder rows for remaining required tasks
  const remaining=Math.max(0,req-done);
  let emptyRows='';
  for(let i=0;i<remaining;i++){
    emptyRows+=`<div class="mytask-row">
      <div class="mytask-check"></div>
      <div class="mytask-info">
        <div class="mytask-name" style="color:var(--text-muted);font-style:italic;">Nog in te plannen</div>
        <div class="mytask-meta">Pak een taak hieronder op</div>
      </div>
    </div>`;
  }
  return `<div class="mtb-wrap">
    <div class="mtb-head">
      <div class="mtb-title">Jouw taken deze vakantie</div>
      <div class="mtb-intro">Deze taken moet je minimaal doen in de vakantie. Zo zorgen we dat het werk eerlijk verdeeld is en iedereen kan genieten.</div>
      <div class="mtb-progress ${allDone?'all-done':'pending'}">${allDone?'Je hebt je '+req+' taken ingepland ✅':done+' van '+req+' taken ingepland'}</div>
    </div>
    ${claimedRows}${emptyRows}
  </div>`;
}

function renderMyTasks(){
  // No longer used as a separate view — kept empty for safety
}

function initApp(){
  const fam=FAMILIES[currentUser];
  document.getElementById('user-dot').style.background=fam.color;
  // Show readonly badge if applicable
  const nameEl=document.getElementById('user-name');
  if(isReadOnly()){
    nameEl.innerHTML=`${fam.label} <span class="readonly-badge">👀 Bekijk modus</span>`;
  } else {
    nameEl.textContent=fam.label;
  }
  document.getElementById('legend-families').innerHTML=Object.entries(FAMILIES)
    .filter(([k])=>k!=='beheerder')
    .map(([k,f])=>`<div class="legend-item"><div class="legend-dot" style="background:${f.color}"></div><span>${f.label}</span></div>`).join('');
  updateToolbar();
  renderDay(0);
}

function updateToolbar(){
  const toolbar=document.getElementById('day-toolbar');
  const pdfBtn=toolbar.querySelector('button:first-child');
  pdfBtn.style.display=(currentView==='overview'||currentView==='mytasks')?'none':'';
}

// ── Render day ────────────────────────────────
function renderDay(day){
  currentView='day'; updateToolbar();
  const container=document.getElementById('day-view');
  const readonly=isReadOnly();
  let html=`<div class="print-header">🌿 Vakantie Planning — ${DAYS[day]}</div>`;

  if(readonly){
    html+=`<div style="background:#d4e8da;border:1px solid #b8d8c4;border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.83rem;color:#2d5c3a;">
      👀 <strong>Pa & Ma</strong> — jullie zijn ingelogd in bekijkmodus. Jullie kunnen de planning bekijken maar niet bewerken.
    </div>`;
  }

  html+=renderMyTasksBanner();
  html+=slotsForDay(day).map(slot=>{
    const data=planning[day][slot.id];
    const claimed=data.claimedBy||[];
    const iClaimed=claimed.includes(currentUser);
    const tagsHTML=claimed.map(fk=>{
      const fam=FAMILIES[fk];
      const canUnclaim=!readonly&&(fk===currentUser||currentUser==='beheerder');
      return `<div class="claim-tag" style="background:${fam.light};color:${fam.color}">
        <div class="claim-dot" style="background:${fam.color}"></div>
        <span>${fam.label}</span>
        ${canUnclaim?`<button class="unclaim-btn" onclick="window.unclaim(${day},'${slot.id}','${fk}')">✕</button>`:''}
      </div>`;
    }).join('');
    const noteHTML=data.note?`<div class="slot-note">📝 ${data.note}</div>`:'';

    let actionsHTML='';
    if(!readonly){
      const isSeeded=day===0&&(slot.id==='koffie'||slot.id==='avond')&&claimed.includes('gerben');
      const claimBtn=iClaimed||isSeeded?'':`<button class="claim-btn" onclick="window.openModal(${day},'${slot.id}')">+ Ik pak dit op</button>`;
      const editNoteBtn=slot.hasNote&&(iClaimed||currentUser==='beheerder')
        ?`<button class="edit-note-btn" onclick="window.openNoteModal(${day},'${slot.id}')">✏️ ${data.note?'Bewerk omschrijving':'Voeg omschrijving toe'}</button>`:'';
      actionsHTML=`<div class="slot-actions">${claimBtn}${editNoteBtn}</div>`;
    }

    return `<div class="timeslot" data-slot="${slot.id}">
      <div class="timeslot-header">
        <div class="timeslot-time">${slot.time}</div>
        <div class="timeslot-title-wrap">
          <div class="timeslot-name">${slot.label}</div>
          ${slot.subtitle?`<div class="timeslot-subtitle">${slot.subtitle}</div>`:''}
        </div>
      </div>
      <div class="entries">${tagsHTML||'<div class="empty-msg">Nog niemand</div>'}${noteHTML}</div>
      ${actionsHTML}
    </div>`;
  }).join('');
  container.innerHTML=html;
}

// ── Render overview ───────────────────────────
function renderOverview(){
  currentView='overview'; updateToolbar();
  const container=document.getElementById('day-view');
  const readonly=isReadOnly();

  // Mobile: stacked per day
  let mobileHTML='';
  for(let d=0;d<3;d++){
    mobileHTML+=`<div class="ov-day-section"><div class="ov-day-heading">${DAYS[d]}</div>`;
    slotsForDay(d).forEach(slot=>{
      const data=planning[d][slot.id];
      const claimed=data.claimedBy||[];
      const iClaimed=claimed.includes(currentUser);
      const isEmpty=claimed.length===0;
      const cardClass=iClaimed?'ov-mine':isEmpty?'ov-empty-slot':'';
      const tags=claimed.map(fk=>{
        const fam=FAMILIES[fk];
        return `<span class="ov-tag" style="background:${fam.light};color:${fam.color}"><span class="ov-tag-dot" style="background:${fam.color}"></span>${fam.label}</span>`;
      }).join('');
      mobileHTML+=`<div class="ov-card ${cardClass}" onclick="window.goToDay(${d},'${slot.id}')">
        <div class="ov-card-row">
          <span class="ov-card-time">${slot.time}</span>
          <span class="ov-card-name">${slot.label}</span>
          <div class="ov-tags-inline">${tags||(!readonly?`<span class="ov-cta">+ Pak op</span>`:``)}
          </div>
        </div>
        ${data.note?`<div class="ov-note-preview">📝 ${data.note}</div>`:''}
      </div>`;
    });
    mobileHTML+=`</div>`;
  }

  // Desktop: grid
  let gridHTML=`<div class="overview-grid">
    <div class="ov-gh">Tijdslot</div>
    ${SHORT_DAYS.map(d=>`<div class="ov-gh day-col">${d}</div>`).join('')}`;
  TIMESLOTS.forEach(slot=>{
    gridHTML+=`<div class="ov-slot-label">
      <div class="ov-slot-sname">${slot.label}</div>
      ${slot.subtitle?`<div class="ov-slot-ssub">${slot.subtitle}</div>`:''}
      <div class="ov-slot-time">${slot.time}</div>
    </div>`;
    for(let d=0;d<3;d++){
      if(!slot.days.includes(d)){
        gridHTML+=`<div class="ov-cell ov-na"><span style="color:#ccc;font-size:.72rem">—</span></div>`;
        continue;
      }
      const data=planning[d][slot.id];
      const claimed=data.claimedBy||[];
      const iClaimed=claimed.includes(currentUser);
      const isEmpty=claimed.length===0;
      const tags=claimed.map(fk=>{
        const fam=FAMILIES[fk];
        return `<div class="ov-cell-tag" style="background:${fam.light};color:${fam.color}"><div class="ov-cell-dot" style="background:${fam.color}"></div>${fam.label}</div>`;
      }).join('');
      const cellClass=iClaimed?'has-me':isEmpty?'empty':'';
      gridHTML+=`<div class="ov-cell ${cellClass}" onclick="window.goToDay(${d},'${slot.id}')">
        ${tags}
        ${isEmpty&&!readonly?`<div class="ov-cell-cta">+ Pak dit op</div>`:''}
        ${data.note?`<div class="ov-cell-note">📝 ${data.note}</div>`:''}
      </div>`;
    }
  });
  gridHTML+=`</div>`;

  container.innerHTML=`<div>${mobileHTML}${gridHTML}</div>`;
}

// ── Navigation ────────────────────────────────
window.selectDay=function(idx,btn){
  currentDay=idx;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderDay(idx);
};
window.selectOverview=function(btn){
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
};

window.goToDay=function(dayIdx,slotId){
  const tabs=document.querySelectorAll('.day-tab');
  tabs.forEach(t=>t.classList.remove('active'));
  tabs[dayIdx+1].classList.add('active');
  currentDay=dayIdx;
  renderDay(dayIdx);
  setTimeout(()=>{
    const el=document.querySelector(`[data-slot="${slotId}"]`);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
};

// ── Claim / unclaim ───────────────────────────
window.unclaim=async function(day,slotId,familyKey){
  if(isReadOnly()) return;
  if(familyKey!==currentUser&&currentUser!=='beheerder')return;
  planning[day][slotId].claimedBy=planning[day][slotId].claimedBy.filter(f=>f!==familyKey);
  await saveSlot(day,slotId);
  renderDay(day);
};

// ── Modal ─────────────────────────────────────
window.openModal=function(day,slotId){
  if(isReadOnly()) return;
  modalContext={day,slotId};
  const slot=TIMESLOTS.find(s=>s.id===slotId);
  const fam=FAMILIES[currentUser];
  document.getElementById('modal-subtitle').textContent=`· ${DAYS[day]} · ${slot.label}`;

  // "jij pakt de taak op van [familienaam]"
  document.getElementById('modal-claim-block').innerHTML=`
    <div class="modal-claim-info">
      Jij pakt de volgende taak op: <strong>${slot.label}</strong>
      ${slot.subtitle?`<br><span style="font-size:.8rem;color:var(--text-muted)">${slot.subtitle}</span>`:''}
    </div>`;

  const noteInput=document.getElementById('note-input');
  noteInput.value=planning[day][slotId].note||'';
  const noteGroup=document.getElementById('note-group');
  if(slot.hasNote){
    noteGroup.classList.remove('hidden');
    document.getElementById('note-label').textContent=slot.noteLabel||'Omschrijving';
    noteInput.placeholder=slot.notePlaceholder||'';
  } else {
    noteGroup.classList.add('hidden');
  }
  document.getElementById('modal-save-btn').textContent='Ik doe dit!';
  document.getElementById('modal-overlay').classList.remove('hidden');
};

window.openNoteModal=function(day,slotId){
  if(isReadOnly()) return;
  modalContext={day,slotId,noteOnly:true};
  const slot=TIMESLOTS.find(s=>s.id===slotId);
  document.getElementById('modal-subtitle').textContent=`· ${DAYS[day]} · ${slot.label}`;
  document.getElementById('modal-claim-block').innerHTML=`<p style="color:var(--text-muted);font-size:.88rem;margin-bottom:.5rem">Omschrijving bewerken</p>`;
  const noteGroup=document.getElementById('note-group');
  noteGroup.classList.remove('hidden');
  document.getElementById('note-label').textContent=slot.noteLabel||'Omschrijving';
  const noteInput=document.getElementById('note-input');
  noteInput.placeholder=slot.notePlaceholder||'';
  noteInput.value=planning[day][slotId].note||'';
  document.getElementById('modal-save-btn').textContent='Opslaan';
  document.getElementById('modal-overlay').classList.remove('hidden');
};

window.closeModal=function(){
  document.getElementById('modal-overlay').classList.add('hidden');
  modalContext=null;
};

window.saveEntry=async function(){
  if(isReadOnly()) return;
  const{day,slotId,noteOnly}=modalContext;
  const note=document.getElementById('note-input').value.trim();
  planning[day][slotId].note=note;
  if(!noteOnly&&!planning[day][slotId].claimedBy.includes(currentUser)){
    planning[day][slotId].claimedBy.push(currentUser);
  }
  await saveSlot(day,slotId);
  closeModal();
  renderDay(day);
};

document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});

// ── Print / PDF ───────────────────────────────
window.printDay=function(){
  window.print();
};
</script>
