<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf7f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vakantie">
<title>Familievakantie Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf7f2;--surface:#fff;--border:#e8e0d5;
    --text:#2a2118;--text-muted:#8a7968;--accent:#c17f3e;--accent-light:#f5e9d8;
    --pa-ma:#4a7c59;--pa-ma-light:#d4e8da;
    --gerben:#3a6fa8;--gerben-light:#d0e3f5;
    --robert:#8b3a8b;--robert-light:#ead0ea;
    --marielle:#c17f3e;--marielle-light:#f5e9d8;
    --jaco:#b84040;--jaco-light:#f5d0d0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
  .hidden{display:none!important;}
  #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:1rem;}
  .loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:var(--text-muted);font-size:.9rem;}
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;width:min(420px,92vw);box-shadow:0 8px 40px rgba(42,33,24,.08);}
  .login-title{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:.3rem;}
  .login-subtitle{color:var(--text-muted);font-size:.88rem;margin-bottom:1.5rem;}
  .family-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.25rem;}
  .family-btn{padding:.75rem .9rem;border-radius:12px;border:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;transition:all .2s;text-align:left;}
  .family-btn:hover{transform:translateY(-1px);}
  .family-btn.selected{border-color:currentColor;font-weight:600;}
  .family-btn[data-family="pa-ma"]{background:var(--pa-ma-light);color:var(--pa-ma);}
  .family-btn[data-family="gerben"]{background:var(--gerben-light);color:var(--gerben);}
  .family-btn[data-family="robert"]{background:var(--robert-light);color:var(--robert);}
  .family-btn[data-family="marielle"]{background:var(--marielle-light);color:var(--marielle);}
  .family-btn[data-family="jaco"]{background:var(--jaco-light);color:var(--jaco);}
  .family-btn[data-family="beheerder"]{background:#e8e0d5;color:#2a2118;grid-column:1/-1;}
  .pin-row{display:flex;gap:.6rem;align-items:center;}
  .pin-input{flex:1;padding:.7rem 1rem;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;letter-spacing:.2em;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;}
  .pin-input:focus{border-color:var(--accent);}
  .login-btn{padding:.7rem 1.25rem;background:var(--text);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;white-space:nowrap;}
  .login-btn:hover{background:var(--accent);}
  .login-error{color:#b84040;font-size:.83rem;margin-top:.5rem;min-height:1.2em;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-title{font-family:'Playfair Display',serif;font-size:1.2rem;}
  .header-title span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:.5rem;}
  .sync-indicator{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:.3rem;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;transition:background .3s;}
  .sync-dot.live{background:#4a7c59;}
  .user-badge{display:flex;align-items:center;gap:.5rem;padding:.35rem .8rem;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid var(--border);}
  .user-dot{width:9px;height:9px;border-radius:50%;}
  .readonly-badge{display:inline-flex;align-items:center;background:#d4e8da;color:#4a7c59;font-size:.72rem;font-weight:600;padding:.25rem .65rem;border-radius:20px;}
  .legend{background:var(--surface);border-bottom:1px solid var(--border);}
  .legend-families{display:flex;flex-wrap:wrap;gap:.4rem;padding:.6rem 1.25rem .75rem;}
  .legend-item{display:flex;align-items:center;gap:.35rem;font-size:.74rem;color:var(--text-muted);}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  .day-tabs{display:flex;padding:.75rem 1rem 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{padding:.5rem 1rem;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
  .day-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600;}
  .day-toolbar{display:flex;justify-content:flex-end;gap:.5rem;padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);}
  .toolbar-btn{display:flex;align-items:center;gap:.35rem;padding:.4rem .85rem;background:none;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text-muted);cursor:pointer;}
  .toolbar-btn:hover{border-color:var(--accent);color:var(--accent);}
  .main{padding:1rem;max-width:900px;margin:0 auto;}
  /* MY TASKS BANNER */
  .mtb-wrap{background:#fdf9f4;border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden;}
  .mtb-head{padding:.75rem 1rem .5rem;}
  .mtb-title{font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:.25rem;}
  .mtb-intro{font-size:.78rem;color:var(--text-muted);line-height:1.45;}
  .mtb-progress{font-size:.72rem;font-weight:600;margin-top:.35rem;}
  .mtb-progress.all-done{color:#4a7c59;}
  .mtb-progress.pending{color:var(--accent);}
  .mytask-row{display:flex;align-items:center;gap:.75rem;padding:.55rem 1rem;border-top:1px solid var(--border);}
  .mytask-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .mytask-check.checked{background:#4a7c59;border-color:#4a7c59;}
  .mytask-info{flex:1;}
  .mytask-name{font-size:.83rem;font-weight:600;color:var(--text);}
  .mytask-row.done .mytask-name{color:#4a7c59;}
  .mytask-meta{font-size:.7rem;color:var(--text-muted);margin-top:.1rem;}
  /* PROGRAM BLOCK */
  .program-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden;}
  .program-header{padding:.8rem 1rem .6rem;background:var(--bg);border-bottom:1px solid var(--border);}
  .program-header-title{font-family:'Playfair Display',serif;font-size:.98rem;}
  .program-fixed-item{padding:.6rem 1rem;border-bottom:1px solid var(--border);}
  .program-item-label{font-size:.85rem;font-weight:600;color:var(--text);}
  .program-item-note{font-size:.73rem;color:var(--text-muted);margin-top:.15rem;}
  .program-event-note{font-size:.78rem;color:#2d5c3a;background:#d4e8da;padding:.55rem 1rem;font-style:italic;}
  .program-fixed-note{font-size:.78rem;color:var(--text-muted);background:#fffbf5;padding:.55rem 1rem;border-top:1px solid var(--border);}
  /* CHOICE */
  .choice-instruction{font-size:.78rem;color:var(--text-muted);padding:.5rem 1rem;background:#fffbf5;border-bottom:1px solid var(--border);}
  .choice-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;}
  .choice-item.chosen{background:#f2faf5;}
  .choice-item.unchosen{opacity:.45;}
  .choice-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;position:relative;}
  .choice-radio.chosen{background:#4a7c59;border-color:#4a7c59;}
  .choice-radio.chosen::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;}
  .choice-info{flex:1;}
  .choice-label{font-size:.85rem;font-weight:600;color:var(--text);}
  .choice-item.chosen .choice-label{color:#4a7c59;}
  .choice-desc{font-size:.72rem;color:var(--text-muted);margin-top:.1rem;}
  .choose-btn{padding:.35rem .8rem;background:#4a7c59;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chosen-badge{font-size:.72rem;color:#4a7c59;font-weight:600;background:#d4e8da;padding:.2rem .55rem;border-radius:10px;white-space:nowrap;}
  .change-choice-btn{background:none;border:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;text-decoration:underline;padding:.5rem 1rem .6rem;display:block;}
  /* CORVEE */
  .corvee-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden;}
  .corvee-header{display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);}
  .corvee-header-title{font-family:'Playfair Display',serif;font-size:.95rem;flex:1;}
  .corvee-count{font-size:.72rem;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.15rem .5rem;}
  .corvee-task{display:flex;align-items:center;gap:.75rem;padding:.55rem 1rem;border-bottom:1px solid var(--border);}
  .corvee-task:last-child{border-bottom:none;}
  .corvee-task-info{flex:1;}
  .corvee-task-name{font-size:.85rem;font-weight:600;color:var(--text);}
  .corvee-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.25rem;}
  .claim-tag{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .6rem;border-radius:20px;font-size:.75rem;font-weight:600;}
  .claim-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .unclaim-btn{background:none;border:none;cursor:pointer;font-size:.72rem;padding:0 0 0 .25rem;opacity:.5;}
  .unclaim-btn:hover{opacity:1;}
  .claim-btn{padding:.35rem .75rem;background:none;border:1.5px dashed var(--border);border-radius:8px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .claim-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  /* OVERVIEW mobile */
  .ov-day-section{margin-bottom:1.25rem;}
  .ov-day-heading{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:2px solid var(--border);}
  .ov-program-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;margin-bottom:.4rem;}
  .ov-program-title{font-size:.75rem;font-weight:700;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.3rem;}
  .ov-program-choice{font-size:.8rem;color:#4a7c59;font-weight:600;}
  .ov-program-pending{font-size:.78rem;color:var(--accent);font-style:italic;}
  .ov-program-fixed{font-size:.75rem;color:var(--text-muted);}
  .ov-corvee-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;}
  .ov-corvee-pill{font-size:.7rem;padding:.2rem .6rem;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);}
  .ov-corvee-pill.mine{background:#f2faf5;border-color:#b8d8c4;color:#4a7c59;font-weight:600;}
  /* OVERVIEW desktop */
  @media(min-width:700px){
    .ov-day-section{display:none;}
    .overview-grid-wrap{display:block;}
    .overview-grid{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface);}
    .ov-gh-row,.ov-section-row,.ov-task-row,.ov-program-row{display:grid;grid-template-columns:minmax(170px,1.5fr) repeat(3,1fr);}
    .ov-gh{padding:.6rem .9rem;font-weight:700;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);background:var(--bg);border-bottom:2px solid var(--border);}
    .ov-gh.day-col{text-align:center;border-left:1px solid var(--border);color:var(--text);font-family:'Playfair Display',serif;font-size:.85rem;text-transform:none;letter-spacing:0;}
    .ov-section-label{padding:.45rem .9rem;background:#f5f1ea;font-size:.7rem;font-weight:700;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);}
    .ov-section-spacer{border-left:1px solid var(--border);border-bottom:1px solid var(--border);background:#f5f1ea;}
    .ov-task-label{padding:.45rem .9rem;font-size:.77rem;color:var(--text);border-bottom:1px solid var(--border);background:var(--bg);}
    .ov-cell{padding:.4rem .65rem;border-left:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.15rem;min-height:40px;cursor:pointer;transition:background .15s;}
    .ov-cell.na{background:#f5f5f5;cursor:default;}
    .ov-cell.empty{background:#fffbf5;}
    .ov-cell.empty:hover{background:var(--accent-light);}
    .ov-cell.has-me{background:#f2faf5;}
    .ov-cell-tag{display:inline-flex;align-items:center;gap:.2rem;font-size:.66rem;font-weight:600;padding:.12rem .4rem;border-radius:20px;}
    .ov-cell-dot{width:4px;height:4px;border-radius:50%;}
    .ov-cell-cta{font-size:.66rem;color:var(--accent);font-style:italic;}
    .ov-prog-label{padding:.45rem .9rem;font-size:.77rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);background:var(--bg);}
    .ov-prog-cell{padding:.4rem .65rem;border-left:1px solid var(--border);border-bottom:1px solid var(--border);min-height:44px;font-size:.72rem;color:var(--text-muted);}
    .ov-prog-chosen{color:#4a7c59;font-weight:600;}
    .ov-prog-pending{color:var(--accent);font-style:italic;}
  }
  @media(max-width:699px){.overview-grid-wrap{display:none;}}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(42,33,24,.4);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--surface);border-radius:18px;padding:1.75rem;width:min(460px,94vw);}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1.25rem;}
  .modal-claim-info{background:var(--accent-light);border:1px solid #e8d0ae;border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:var(--text);line-height:1.6;}
  .modal-claim-info strong{color:var(--accent);}
  .modal-actions{display:flex;gap:.6rem;margin-top:1.25rem;}
  .btn-primary{flex:1;padding:.7rem;background:var(--text);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;}
  .btn-primary:hover{background:var(--accent);}
  .btn-cancel{padding:.7rem 1.1rem;background:none;color:var(--text-muted);border:2px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Verbinden met database...</div>
</div>
<div id="login-screen" class="hidden">
  <div class="login-card">
    <h1 class="login-title">&#127807; Familievakantie</h1>
    <p class="login-subtitle">29 april &#8211; 1 mei &middot; Kies jouw familie en pincode</p>
    <div class="family-grid">
      <button class="family-btn" data-family="pa-ma">&#128116;&#128117; Pa &amp; Ma</button>
      <button class="family-btn" data-family="gerben">&#128106; Gerben &amp; Bertine</button>
      <button class="family-btn" data-family="robert">&#128104;&#8205;&#128105;&#8205;&#128103; Robert &amp; Renate</button>
      <button class="family-btn" data-family="marielle">&#128105; Mari&#235;lle</button>
      <button class="family-btn" data-family="jaco">&#128106; Jaco &amp; Berdieke</button>
      <button class="family-btn" data-family="beheerder">&#128273; Beheerder</button>
    </div>
    <div class="pin-row">
      <input type="password" class="pin-input" id="pin-input" placeholder="Pincode" maxlength="6" inputmode="numeric">
      <button class="login-btn" onclick="doLogin()">Inloggen &#8594;</button>
    </div>
    <p class="login-error" id="login-error"></p>
  </div>
</div>
<div id="app" class="hidden">
  <header>
    <div class="header-title">&#127807; Vakantie <span>Planning</span></div>
    <div class="header-right">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">verbinden...</span></div>
      <div class="user-badge" onclick="logout()">
        <div class="user-dot" id="user-dot"></div>
        <span id="user-name">...</span>
        <span style="color:var(--text-muted)">&middot; Uit</span>
      </div>
    </div>
  </header>
  <div class="legend" id="legend"><div class="legend-families" id="legend-families"></div></div>
  <div class="day-tabs">
    <button class="day-tab" onclick="selectOverview(this)">&#128203; Overzicht</button>
    <button class="day-tab active" onclick="selectDay(0,this)">Wo 29/4</button>
    <button class="day-tab" onclick="selectDay(1,this)">Do 30/4</button>
    <button class="day-tab" onclick="selectDay(2,this)">Vr 1/5</button>
  </div>
  <div class="day-toolbar" id="day-toolbar">
    <button class="toolbar-btn" onclick="window.print()">&#128424;&#65039; PDF</button>
  </div>
  <div class="main" id="day-view"></div>
</div>
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">Taak</h2>
    <div id="modal-claim-block"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" onclick="saveEntry()">Ik pak dit op</button>
    </div>
  </div>
</div>
<script type="module">

const CORVEE={
  ochtend:{label:'Ochtend',emoji:'🌅',days:[1,2],tasks:[
    {id:'o_dekken',  label:'Tafel dekken'},

    {id:'a_koffie',  label:'Koffie schenken'},
    {id:'a_drankje', label:'Drankje/borrel'},
  ]}
};
const DAGDELEN=['ochtend','middag','avond'];

const PROGRAM=[
  {day:0,fixed:true,
   items:[
     {label:'Hunebedcentrum Borger',note:'Vertrek ~11:30 · Lunch aldaar · Museum + geopark'},
     {label:'Avondeten: chinees bestellen',note:''},
   ],
   eventNote:'Gerben & Bertine vieren vanavond de verjaardag van Bart 🎉'},
  {day:1,fixed:false,
   choices:[
     {id:'grolloo',    label:'Grolloo Joy',               desc:'Klimpark · Avontuurlijk voor de kids'},
     {id:'schaapskooi',label:'Schaapskooi Baggerveen',    desc:'Natuur & dieren'},
     {id:'boomkroon',  label:'Boomkroonpad Drouwen',      desc:'Wandeling door de boomtoppen'},
     {id:'hemelriek',  label:"Picknick 't Nije Hemelriek",desc:'Mooi natuurgebied'},
     {id:'gevangenis', label:'Gevangenismuseum',          desc:'Overdekt · Goed bij regen'},
   ],
   fixedNote:'Avondeten: pizza in de pizzaoven + pannenkoeken 🍕🥞'},
  {day:2,fixed:false,
   choices:[
     {id:'pantropica',label:'Pantropica',               desc:'Tropisch zwemparadijs'},
     {id:'deventer',  label:'Happen & Stappen Deventer',desc:'Stadswandeling + lekker eten'},
   ],
   fixedNote:'Check-out 11:00 · Lunch elders'},
];

// Seeded slots: Gerben + Bertine op wo avond (verjaardag kind)
const SEEDED=[{fk:'gerben',day:0,id:'a_koffie'},{fk:'pa-ma',day:1,id:'o_broodjes'},{fk:'pa-ma',day:2,id:'o_broodjes'}];
function isSeeded(day,taskId){return SEEDED.some(s=>s.day===day&&s.id===taskId);}

// Required corvée tasks per family
// Total: ochtend 5x2=10 + middag 3x1=3 + avond 6x2=12 = 25
const REQUIRED={'gerben':6,'robert':7,'marielle':4,'jaco':6};

let planning={};
let choices={};
let currentUser=null,currentDay=0,currentView='day',modalContext=null;

function isReadOnly(){return currentUser&&FAMILIES[currentUser]&&FAMILIES[currentUser].readonly;}

function initPlanning(){
  for(let d=0;d<3;d++){
    planning[d]={};
    DAGDELEN.forEach(dl=>{
      if(CORVEE[dl].days.includes(d))
        CORVEE[dl].tasks.forEach(t=>{planning[d][t.id]={claimedBy:[],note:''};});
    });
  }
}
initPlanning();

function requiredCount(){return REQUIRED[currentUser]||0;}
function completedCount(fk){
  let n=0;
  for(let d=0;d<3;d++) DAGDELEN.forEach(dl=>{
    if(!CORVEE[dl].days.includes(d)) return;
    CORVEE[dl].tasks.forEach(t=>{
      if(planning[d]&&planning[d][t.id]&&planning[d][t.id].claimedBy.includes(fk)) n++;
    });
  });
  return n;
}

onValue(ref(db,'planning'),async(snap)=>{
  const data=snap.val();
  if(data){
    for(let d=0;d<3;d++) DAGDELEN.forEach(dl=>{
      if(!CORVEE[dl].days.includes(d)) return;
      CORVEE[dl].tasks.forEach(t=>{
        if(data[d]&&data[d][t.id]){
          const fb=data[d][t.id];
          planning[d][t.id]={claimedBy:fb.claimedBy?Object.values(fb.claimedBy):[],note:fb.note||''};
        }
      });
    });
  }
  await seedGerben();
  document.getElementById('sync-dot').classList.add('live');
  document.getElementById('sync-text').textContent='live';
  document.getElementById('loading-screen').classList.add('hidden');
  if(!currentUser){document.getElementById('login-screen').classList.remove('hidden');}
  else renderCurrentView();
},(err)=>{
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
});

onValue(ref(db,'choices'),(snap)=>{
  choices=snap.val()||{};
  if(currentUser) renderCurrentView();
});

async function saveSlot(day,taskId){
  const slot=planning[day][taskId];
  const updates={};
  updates[`planning/${day}/${taskId}/note`]=slot.note||'';
  updates[`planning/${day}/${taskId}/claimedBy`]=slot.claimedBy.length>0?Object.fromEntries(slot.claimedBy.map((f,i)=>[i,f])):null;
  await update(ref(db),updates);
}
async function saveChoice(day,choiceId){
  const updates={};
  updates[`choices/${day}`]=choiceId;
  await update(ref(db),updates);
}
async function seedGerben(){
  for(const s of SEEDED){
    if(planning[s.day]&&planning[s.day][s.id]&&!planning[s.day][s.id].claimedBy.includes(s.fk)){
      planning[s.day][s.id].claimedBy.push(s.fk);
      await saveSlot(s.day,s.id);
    }
  }
}

const SEL={key:null};
document.querySelectorAll('.family-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.family-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    SEL.key=btn.dataset.family;
    document.getElementById('pin-input').focus();
  });
});
document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

window.doLogin=function(){
  const key=SEL.key,pin=document.getElementById('pin-input').value;
  const err=document.getElementById('login-error');
  if(!key){err.textContent='Kies eerst een familie.';return;}
  if(pin!==FAMILIES[key].pin){err.textContent='Pincode klopt niet.';return;}
  currentUser=key;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
};
window.logout=function(){
  currentUser=null;SEL.key=null;
  document.querySelectorAll('.family-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pin-input').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
};

function initApp(){
  const fam=FAMILIES[currentUser];
  document.getElementById('user-dot').style.background=fam.color;
  const nameEl=document.getElementById('user-name');
  nameEl.innerHTML=isReadOnly()?`${fam.label} <span class="readonly-badge">👀 Bekijk modus</span>`:fam.label;
  document.getElementById('legend-families').innerHTML=Object.entries(FAMILIES)
    .filter(([k])=>k!=='beheerder')
    .map(([k,f])=>`<div class="legend-item"><div class="legend-dot" style="background:${f.color}"></div><span>${f.label}</span></div>`).join('');
  updateToolbar();
  renderDay(0);
}
function updateToolbar(){
  document.getElementById('day-toolbar').querySelector('button').style.display=currentView==='overview'?'none':'';
}
function renderCurrentView(){
  if(currentView==='overview') renderOverview();
  else renderDay(currentDay);
}

function renderMyTasksBanner(){
  if(isReadOnly()||!currentUser||currentUser==='beheerder') return '';
  const req=requiredCount();
  if(!req) return '';
  const done=completedCount(currentUser);
  const allDone=done>=req;
  const chkSVG='<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  let claimedRows='';
  for(let d=0;d<3;d++) DAGDELEN.forEach(dl=>{
    if(!CORVEE[dl].days.includes(d)) return;
    CORVEE[dl].tasks.forEach(t=>{
      if(!planning[d]||!planning[d][t.id]||!planning[d][t.id].claimedBy.includes(currentUser)) return;
      claimedRows+=`<div class="mytask-row done"><div class="mytask-check checked">${chkSVG}</div><div class="mytask-info"><div class="mytask-name">${t.label}</div><div class="mytask-meta">${DAYS[d]} · ${CORVEE[dl].label.toLowerCase()}</div></div></div>`;
    });
  });
  let emptyRows='';
  for(let i=0;i<Math.max(0,req-done);i++){
    emptyRows+=`<div class="mytask-row"><div class="mytask-check"></div><div class="mytask-info"><div class="mytask-name" style="color:var(--text-muted);font-style:italic;">Nog in te plannen</div><div class="mytask-meta">Pak hieronder een taak op</div></div></div>`;
  }
  return `<div class="mtb-wrap"><div class="mtb-head"><div class="mtb-title">Jouw taken deze vakantie</div><div class="mtb-intro">Deze taken moet je minimaal doen in de vakantie. Zo zorgen we dat het werk eerlijk verdeeld is en iedereen kan genieten.</div><div class="mtb-progress ${allDone?'all-done':'pending'}">${allDone?'Je hebt je '+req+' taken ingepland ✅':done+' van '+req+' taken ingepland'}</div></div>${claimedRows}${emptyRows}</div>`;
}

function renderProgramBlock(day){
  const prog=PROGRAM.find(p=>p.day===day);
  if(!prog) return '';
  const isBeheerder=currentUser==='beheerder';
  let inner='';
  if(prog.fixed){
    inner=prog.items.map(item=>`<div class="program-fixed-item"><div class="program-item-label">${item.label}${item.note?`<div class="program-item-note">${item.note}</div>`:''}</div></div>`).join('');
    if(prog.eventNote) inner+=`<div class="program-event-note">${prog.eventNote}</div>`;
  } else {
    const chosen=choices[day]||null;
    if(!chosen) inner+=`<div class="choice-instruction">${isBeheerder?'Kies de activiteit voor deze dag:':'De beheerder kiest nog de activiteit voor deze dag.'}</div>`;
    inner+=prog.choices.map(c=>{
      const isChosen=chosen===c.id;
      const isOther=chosen&&!isChosen;
      return `<div class="choice-item${isChosen?' chosen':isOther?' unchosen':''}">
        <div class="choice-radio${isChosen?' chosen':''}"></div>
        <div class="choice-info"><div class="choice-label">${c.label}</div><div class="choice-desc">${c.desc}</div></div>
        ${isChosen?'<span class="chosen-badge">✓ Gekozen</span>':isBeheerder&&!chosen?`<button class="choose-btn" onclick="window.chooseActivity(${day},'${c.id}')">Kies dit</button>`:''}
      </div>`;
    }).join('');
    if(isBeheerder&&chosen) inner+=`<button class="change-choice-btn" onclick="window.chooseActivity(${day},null)">✏️ Keuze wijzigen</button>`;
    if(prog.fixedNote) inner+=`<div class="program-fixed-note">📌 ${prog.fixedNote}</div>`;
  }
  return `<div class="program-block"><div class="program-header"><div class="program-header-title">📍 Programma</div></div>${inner}</div>`;
}

function renderCorveeSections(day){
  if(isReadOnly()){
    let html='';
    DAGDELEN.forEach(dl=>{
      const sec=CORVEE[dl];
      if(!sec.days.includes(day)) return;
      const claimed=sec.tasks.filter(t=>planning[day]&&planning[day][t.id]&&planning[day][t.id].claimedBy.length>0).length;
      html+=`<div class="corvee-section"><div class="corvee-header"><span style="font-size:1rem">${sec.emoji}</span><div class="corvee-header-title">${sec.label} corvée</div><div class="corvee-count">${claimed}/${sec.tasks.length}</div></div>`;
      sec.tasks.forEach(t=>{
        const cb=(planning[day]&&planning[day][t.id]?planning[day][t.id].claimedBy:[])||[];
        const tags=cb.map(fk=>{const fam=FAMILIES[fk];return `<div class="claim-tag" style="background:${fam.light};color:${fam.color}"><div class="claim-dot" style="background:${fam.color}"></div><span>${fam.label}</span></div>`;}).join('');
        html+=`<div class="corvee-task"><div class="corvee-task-info"><div class="corvee-task-name">${t.label}</div>${cb.length?`<div class="corvee-tags">${tags}</div>`:''}</div></div>`;
      });
      html+=`</div>`;
    });
    return html;
  }
  let html='';
  DAGDELEN.forEach(dl=>{
    const sec=CORVEE[dl];
    if(!sec.days.includes(day)) return;
    const claimed=sec.tasks.filter(t=>planning[day]&&planning[day][t.id]&&planning[day][t.id].claimedBy.length>0).length;
    html+=`<div class="corvee-section"><div class="corvee-header"><span style="font-size:1rem">${sec.emoji}</span><div class="corvee-header-title">${sec.label} corvée</div><div class="corvee-count">${claimed}/${sec.tasks.length}</div></div>`;
    sec.tasks.forEach(t=>{
      const data=(planning[day]&&planning[day][t.id])||{claimedBy:[]};
      const cb=data.claimedBy||[];
      const iClaimed=cb.includes(currentUser);
      const seeded=isSeeded(day,t.id);
      const tags=cb.map(fk=>{
        const fam=FAMILIES[fk];
        const canUnclaim=(fk===currentUser||currentUser==='beheerder')&&!(seeded&&fk==='gerben');
        return `<div class="claim-tag" style="background:${fam.light};color:${fam.color}"><div class="claim-dot" style="background:${fam.color}"></div><span>${fam.label}</span>${canUnclaim?`<button class="unclaim-btn" onclick="window.unclaim(${day},'${t.id}','${fk}')">✕</button>`:''}</div>`;
      }).join('');
      const req2=REQUIRED[currentUser]||0;
      const atMax=req2>0&&completedCount(currentUser)>=req2;
      const showClaim=!iClaimed&&!(seeded&&cb.includes('gerben'))&&(!atMax||currentUser==='beheerder');
      html+=`<div class="corvee-task"><div class="corvee-task-info"><div class="corvee-task-name">${t.label}</div>${cb.length?`<div class="corvee-tags">${tags}</div>`:''}</div>${showClaim?`<button class="claim-btn" onclick="window.openModal(${day},'${t.id}','${dl}')">+ Ik pak dit op</button>`:''}</div>`;
    });
    html+=`</div>`;
  });
  return html;
}

function renderDay(day){
  currentView='day';updateToolbar();currentDay=day;
  const readonly=isReadOnly();
  let html='';
  if(readonly) html+=`<div style="background:#d4e8da;border:1px solid #b8d8c4;border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.83rem;color:#2d5c3a;">👀 <strong>Pa & Ma</strong> — jullie zijn ingelogd in bekijkmodus.</div>`;
  html+=renderMyTasksBanner();
  html+=renderProgramBlock(day);
  html+=renderCorveeSections(day);
  document.getElementById('day-view').innerHTML=html;
}

function renderOverview(){
  currentView='overview';updateToolbar();
  const readonly=isReadOnly();
  let mobileHTML='';
  for(let d=0;d<3;d++){
    mobileHTML+=`<div class="ov-day-section"><div class="ov-day-heading">${DAYS[d]}</div>`;
    const prog=PROGRAM.find(p=>p.day===d);
    if(prog){
      let pc='';
      if(prog.fixed){pc=`<div class="ov-program-fixed">${prog.items.map(i=>i.label).join(' &middot; ')}</div>`;}
      else{
        const ch=choices[d],ci=ch?prog.choices.find(c=>c.id===ch):null;
        pc=ci?`<div class="ov-program-choice">&#10003; ${ci.label}</div>`:`<div class="ov-program-pending">Activiteit nog te kiezen</div>`;
        if(prog.fixedNote) pc+=`<div class="ov-program-fixed" style="margin-top:.2rem">${prog.fixedNote}</div>`;
      }
      mobileHTML+=`<div class="ov-program-card"><div class="ov-program-title">Programma</div>${pc}</div>`;
    }
    const pills=DAGDELEN.filter(dl=>CORVEE[dl].days.includes(d)).map(dl=>{
      const sec=CORVEE[dl];
      const total=sec.tasks.length;
      const claimed=sec.tasks.filter(t=>planning[d]&&planning[d][t.id]&&planning[d][t.id].claimedBy.length>0).length;
      const iMine=sec.tasks.some(t=>planning[d]&&planning[d][t.id]&&planning[d][t.id].claimedBy.includes(currentUser));
      return `<div class="ov-corvee-pill${iMine?' mine':''}">${sec.emoji} ${sec.label} ${claimed}/${total}</div>`;
    }).join('');
    mobileHTML+=`<div class="ov-corvee-row">${pills}</div></div>`;
  }

  let gridHTML=`<div class="overview-grid"><div class="ov-gh-row"><div class="ov-gh">Taak</div>${SHORT_DAYS.map(d=>`<div class="ov-gh day-col">${d}</div>`).join('')}</div>`;
  // Program row
  gridHTML+=`<div class="ov-program-row"><div class="ov-prog-label">&#128205; Programma</div>`;
  for(let d=0;d<3;d++){
    const prog=PROGRAM.find(p=>p.day===d);
    let c='';
    if(prog&&prog.fixed) c=`<span>${prog.items.map(i=>i.label).join('<br>')}</span>`;
    else if(prog){
      const ch=choices[d],ci=ch?prog.choices.find(x=>x.id===ch):null;
      c=ci?`<span class="ov-prog-chosen">&#10003; ${ci.label}</span>`:`<span class="ov-prog-pending">Nog te kiezen</span>`;
      if(prog.fixedNote) c+=`<br><span style="font-size:.63rem;color:var(--text-muted)">${prog.fixedNote}</span>`;
    }
    gridHTML+=`<div class="ov-prog-cell">${c}</div>`;
  }
  gridHTML+=`</div>`;
  DAGDELEN.forEach(dl=>{
    const sec=CORVEE[dl];
    gridHTML+=`<div class="ov-section-row"><div class="ov-section-label">${sec.emoji} ${sec.label}</div>${[0,1,2].map(()=>'<div class="ov-section-spacer"></div>').join('')}</div>`;
    sec.tasks.forEach(t=>{
      gridHTML+=`<div class="ov-task-row"><div class="ov-task-label">${t.label}</div>`;
      for(let d=0;d<3;d++){
        if(!sec.days.includes(d)){gridHTML+=`<div class="ov-cell na"><span style="color:#ccc;font-size:.7rem">&#8212;</span></div>`;continue;}
        const cb=(planning[d]&&planning[d][t.id]?planning[d][t.id].claimedBy:[])||[];
        const iClaimed=cb.includes(currentUser);
        const isEmpty=cb.length===0;
        const seeded=isSeeded(d,t.id);
        const tags=cb.map(fk=>{const fam=FAMILIES[fk];return `<div class="ov-cell-tag" style="background:${fam.light};color:${fam.color}"><div class="ov-cell-dot" style="background:${fam.color}"></div>${fam.label}</div>`;}).join('');
        gridHTML+=`<div class="ov-cell ${iClaimed?'has-me':isEmpty?'empty':''}" onclick="window.goToDay(${d})">${tags}${isEmpty&&!readonly&&!seeded?'<div class="ov-cell-cta">+ Pak op</div>':''}</div>`;
      }
      gridHTML+=`</div>`;
    });
  });
  gridHTML+=`</div>`;
  document.getElementById('day-view').innerHTML=`<div>${mobileHTML}</div><div class="overview-grid-wrap">${gridHTML}</div>`;
}

window.selectDay=function(idx,btn){document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderDay(idx);};
window.selectOverview=function(btn){document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderOverview();};
window.goToDay=function(d){const tabs=document.querySelectorAll('.day-tab');tabs.forEach(t=>t.classList.remove('active'));tabs[d+1].classList.add('active');renderDay(d);};

window.unclaim=async function(day,taskId,fk){
  if(isReadOnly()) return;
  if(fk!==currentUser&&currentUser!=='beheerder') return;
  planning[day][taskId].claimedBy=planning[day][taskId].claimedBy.filter(f=>f!==fk);
  await saveSlot(day,taskId);
  renderDay(day);
};

window.chooseActivity=async function(day,choiceId){
  if(currentUser!=='beheerder') return;
  await saveChoice(day,choiceId);
};

window.openModal=function(day,taskId,dagdeel){
  if(isReadOnly()) return;
  modalContext={day,taskId};
  const task=CORVEE[dagdeel].tasks.find(t=>t.id===taskId);
  document.getElementById('modal-title').textContent=task?task.label:'Taak';
  document.getElementById('modal-claim-block').innerHTML=`<div class="modal-claim-info">Jij pakt de volgende taak op:<br><strong>${task?task.label:taskId}</strong><br><span style="font-size:.8rem;color:var(--text-muted)">${DAYS[day]} · ${CORVEE[dagdeel].label.toLowerCase()}</span></div>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
};
window.closeModal=function(){document.getElementById('modal-overlay').classList.add('hidden');modalContext=null;};
window.saveEntry=async function(){
  if(isReadOnly()||!modalContext) return;
  const{day,taskId}=modalContext;
  if(!planning[day][taskId].claimedBy.includes(currentUser)) planning[day][taskId].claimedBy.push(currentUser);
  await saveSlot(day,taskId);
  closeModal();
  renderDay(day);
};
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
</script>
</body>
</html>
